name: AIMeter
options:
  bundleIdPrefix: com.khairul
  deploymentTarget:
    macOS: "14.0"
  xcodeVersion: "16.0"
  groupSortPosition: top

settings:
  base:
    SWIFT_VERSION: "5.9"
    MACOSX_DEPLOYMENT_TARGET: "14.0"
    MARKETING_VERSION: "1.34.0"
    CURRENT_PROJECT_VERSION: "37"

packages:
  Sparkle:
    url: https://github.com/sparkle-project/Sparkle
    from: 2.0.0

targets:
  AIMeter:
    type: application
    platform: macOS
    sources:
      - path: Sources/App
      - path: Sources/Shared
      - path: Resources/Assets.xcassets
    resources:
      - path: Resources
        excludes:
          - WidgetInfo.plist
          - AIMeterWidget.entitlements
          - Assets.xcassets
    info:
      path: Resources/Info.plist
      properties:
        LSUIElement: true
        CFBundleDisplayName: AIMeter
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
        SUFeedURL: "https://github.com/Khairul989/ai-meter/releases/latest/download/appcast.xml"
        SUPublicEDKey: "2gKYaPv+41CVza5bqUH/QI6KHLBWa6VjVSTWEtKPpIM="
        SUEnableAutomaticChecks: true
        CFBundleURLTypes:
          - CFBundleURLSchemes:
              - aimeter
            CFBundleURLName: com.khairul.aimeter
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.khairul.aimeter
        CODE_SIGN_ENTITLEMENTS: Resources/AIMeter.entitlements
        CODE_SIGN_IDENTITY: "-"
        CODE_SIGN_STYLE: Manual
        CODE_SIGNING_REQUIRED: "NO"
        CODE_SIGNING_ALLOWED: "NO"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    entitlements:
      path: Resources/AIMeter.entitlements
      properties:
        com.apple.security.app-sandbox: false
        com.apple.security.application-groups:
          - group.com.khairul.aimeter
        keychain-access-groups:
          - $(AppIdentifierPrefix)com.khairul.aimeter
    dependencies:
      - package: Sparkle

  AIMeterWidget:
    type: app-extension
    platform: macOS
    sources:
      - path: Sources/Widget
      - path: Sources/Shared
    info:
      path: Resources/WidgetInfo.plist
      properties:
        CFBundleDisplayName: AI Meter Widget
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.khairul.aimeter.widget
        CODE_SIGN_ENTITLEMENTS: Resources/AIMeterWidget.entitlements
        CODE_SIGN_IDENTITY: "-"
        CODE_SIGN_STYLE: Manual
        CODE_SIGNING_REQUIRED: "NO"
        CODE_SIGNING_ALLOWED: "NO"
    entitlements:
      path: Resources/AIMeterWidget.entitlements
      properties:
        com.apple.security.app-sandbox: false
        com.apple.security.application-groups:
          - group.com.khairul.aimeter
    dependencies:
      - target: AIMeter
        embed: false
        link: false

  AIMeterTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: Tests
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.khairul.aimeter.tests
        CODE_SIGN_IDENTITY: ""
        CODE_SIGNING_REQUIRED: "NO"
        GENERATE_INFOPLIST_FILE: YES
    dependencies:
      - target: AIMeter
        embed: false
        link: true
